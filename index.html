<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TreactProject</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="header">
        <div class="container">
            <div class="navbar">
                <nav id="navbar">
                <figure class="logo">
                    <img class="logopic" src="assets-2/logo.2c489fc453a1783cbadacf914efa3df6.svg" alt="Logo">
                    <p class="logotitle">Treact</p>
                </figure>              
               <div class="dropdown">
                    <select name="menu" id="menu">
                        <option value="about">About</option>
                        <option value="blog">Blog</option>
                        <option value="pricing">Pricing</option>
                        <option value="contact">Contact Us</option>
                        <option value="login">Login</option>
                        <option value="signup">Sign Up</option>
                    </select>
                </div>
                </nav>
            </div>
            <div class="row">
                <div class="col-2">
                    <h1 class="header__one">Beautiful React Templates <span class="purple">for you</span></h1>
                    <p class="landing__info">Our templates are easy to setup, understand and customize. Fully modular components with a variety of pages and components.</p>
                    <form id="email-form" action="email">
                        <input class="email" type="email" placeholder="Your E-mail Address">
                        <button class="start-button" type="submit">Get Started</button>
                    </form>                
                </div>
                <div class="landing__img--container">
                    <img class="landing__img" src="assets-2/hero-screenshot-1.40a097b525c2f8c9808e.png" alt="Hero Image">
                </div>
            </div>
        </div>
</body>
</html>
